<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - PreMolExpert</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .password-strength {
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .password-strength.weak { color: #dc3545; }
        .password-strength.medium { color: #ffc107; }
        .password-strength.strong { color: #28a745; }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 12px;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .show-password {
            position: relative;
        }

        .show-password input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            font-size: 18px;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🔐 PreMolExpert</h1>
            <p>Redefinir Senha</p>
        </div>

        <div id="message" class="message"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="novaSenha">Nova Senha</label>
                <div class="show-password">
                    <input type="password" id="novaSenha" name="novaSenha"
                           placeholder="Digite sua nova senha"
                           required minlength="6">
                    <span class="toggle-password" onclick="togglePassword('novaSenha')">👁️</span>
                </div>
                <div id="passwordStrength" class="password-strength"></div>
            </div>

            <div class="form-group">
                <label for="confirmaSenha">Confirmar Nova Senha</label>
                <div class="show-password">
                    <input type="password" id="confirmaSenha" name="confirmaSenha"
                           placeholder="Digite novamente sua nova senha"
                           required minlength="6">
                    <span class="toggle-password" onclick="togglePassword('confirmaSenha')">👁️</span>
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                Redefinir Senha
            </button>
        </form>

        <div class="footer">
            <p>© 2026 PreMolExpert - Todos os direitos reservados</p>
        </div>
    </div>

    <script>
        // Extrair token da URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        // Verificar se tem token
        if (!token) {
            showMessage('Token não encontrado. Use o link completo enviado no e-mail.', 'error');
            document.getElementById('submitBtn').disabled = true;
        }

        // Validação de força da senha
        document.getElementById('novaSenha').addEventListener('input', function(e) {
            const senha = e.target.value;
            const strengthDiv = document.getElementById('passwordStrength');

            if (senha.length === 0) {
                strengthDiv.style.display = 'none';
                return;
            }

            strengthDiv.style.display = 'block';

            if (senha.length < 6) {
                strengthDiv.className = 'password-strength weak';
                strengthDiv.textContent = '⚠️ Senha muito fraca (mínimo 6 caracteres)';
            } else if (senha.length < 8) {
                strengthDiv.className = 'password-strength medium';
                strengthDiv.textContent = '⚡ Senha média (recomendado 8+ caracteres)';
            } else {
                strengthDiv.className = 'password-strength strong';
                strengthDiv.textContent = '✅ Senha forte';
            }
        });

        // Toggle mostrar/ocultar senha
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            if (field.type === 'password') {
                field.type = 'text';
            } else {
                field.type = 'password';
            }
        }

        // Submeter formulário
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const novaSenha = document.getElementById('novaSenha').value;
            const confirmaSenha = document.getElementById('confirmaSenha').value;

            // Validar senhas iguais
            if (novaSenha !== confirmaSenha) {
                showMessage('❌ As senhas não coincidem. Tente novamente.', 'error');
                return;
            }

            // Validar tamanho mínimo
            if (novaSenha.length < 6) {
                showMessage('❌ A senha deve ter no mínimo 6 caracteres.', 'error');
                return;
            }

            // Desabilitar botão e mostrar loading
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Processando... <span class="loading"></span>';

            try {
                const response = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: token,
                        novaSenha: novaSenha
                    })
                });

                if (response.ok) {
                    showMessage('✅ Senha redefinida com sucesso! Você já pode fazer login.', 'success');
                    document.getElementById('resetForm').reset();

                    // Redirecionar para login após 3 segundos
                    setTimeout(() => {
                        showMessage('🔄 Redirecionando...', 'info');
                    }, 2000);
                } else if (response.status === 401) {
                    showMessage('❌ Token inválido ou expirado. Solicite um novo link de recuperação.', 'error');
                } else if (response.status === 404) {
                    showMessage('❌ Usuário não encontrado.', 'error');
                } else {
                    showMessage('❌ Erro ao redefinir senha. Tente novamente.', 'error');
                }
            } catch (error) {
                showMessage('❌ Erro de conexão. Verifique se o servidor está rodando.', 'error');
                console.error('Erro:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Redefinir Senha';
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';

            // Auto-hide success message após 5 segundos
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
